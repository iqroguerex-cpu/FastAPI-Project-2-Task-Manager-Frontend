<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | IQROGUEREX</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-400">TaskFlow</h1>
                <p class="text-slate-400 text-sm">Serverless Task Management</p>
            </div>
            <button onclick="fetchTasks()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm transition">Refresh List</button>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl shadow-2xl mb-8 border border-slate-700">
            <h2 class="text-lg font-semibold mb-4 text-indigo-300">New Task</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input id="title" type="text" placeholder="Task Title" class="bg-slate-900 p-3 rounded-lg border border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none">
                <select id="priority" class="bg-slate-900 p-3 rounded-lg border border-slate-600 outline-none">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
            </div>
            <textarea id="description" placeholder="Description" class="w-full bg-slate-900 p-3 rounded-lg border border-slate-600 mb-4 h-20 outline-none"></textarea>
            <button onclick="createTask()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold transition">Add Task to DynamoDB</button>
        </div>

        <div id="task-container" class="space-y-4">
            <p class="text-center text-slate-500 py-10">Initializing connection...</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://89djj7pnai.execute-api.ap-south-1.amazonaws.com/default";

        async function fetchTasks() {
            try {
                const res = await fetch(`${API_BASE}/tasks`);
                const tasks = await res.json();
                renderTasks(tasks);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('task-container');
            if (tasks.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 py-10 bg-slate-800/50 rounded-xl border border-dashed border-slate-700">No tasks found. Get started above!</div>`;
                return;
            }

            container.innerHTML = tasks.sort((a,b) => b.id - a.id).map(task => `
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="px-2 py-0.5 text-[10px] font-bold uppercase rounded ${getPriorityClass(task.priority)}">${task.priority}</span>
                            <h3 class="text-lg font-bold ${task.completed ? 'line-through text-slate-500' : ''}">${task.title}</h3>
                        </div>
                        <p class="text-slate-400 text-sm">${task.description || ''}</p>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="toggleComplete(${JSON.stringify(task).replace(/"/g, '&quot;')})" class="flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-medium ${task.completed ? 'bg-emerald-900/30 text-emerald-400' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'} transition">
                            ${task.completed ? 'Completed' : 'Finish'}
                        </button>
                        <button onclick="deleteTask(${task.id})" class="p-2 text-slate-500 hover:text-red-400 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getPriorityClass(p) {
            if (p === 'high') return 'bg-red-900/50 text-red-400';
            if (p === 'medium') return 'bg-amber-900/50 text-amber-400';
            return 'bg-blue-900/50 text-blue-400';
        }

        async function createTask() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const priority = document.getElementById('priority').value;
            
            if (!title) return alert("Title required");

            const newTask = {
                id: Date.now(), // Unique ID for DynamoDB
                title,
                description,
                priority,
                completed: false
            };

            await fetch(`${API_BASE}/tasks/create_task`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newTask)
            });

            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            fetchTasks();
        }

        async function toggleComplete(task) {
            task.completed = !task.completed;
            await fetch(`${API_BASE}/tasks/update_task/${task.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(task)
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            if (!confirm("Delete task?")) return;
            await fetch(`${API_BASE}/tasks/delete_task/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        fetchTasks();
    </script>
</body>
</html>
